<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Deteksi Objek API</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>Deteksi Objek (API)</h2>

<div class="container">

  <!-- KIRI -->
  <div class="left">
    <input type="file" id="fileInput" accept="image/*">
    <button id="detectBtn">Deteksi</button>

    <div class="image-wrapper">
      <img id="imagePreview">
      <canvas id="canvas"></canvas>
    </div>
  </div>

  <!-- KANAN -->
  <div class="right">
  <h3>Hasil Deteksi</h3>

  <div class="image-wrapper">
    <img id="resultImage">
    <canvas id="resultCanvas"></canvas>
  </div>

  <ul id="resultList"></ul>
</div>

</div>

<script src="script.js"></script>
</body>
</html>
